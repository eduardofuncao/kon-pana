# ── Alt key bindings ───────────────

# Panes
bind -n 'M-"'  split-window -v                                          # C-b "
bind -n 'M-%'  split-window -h                                          # C-b %
bind -n 'M-!'  break-pane                                               # C-b !
bind -n 'M-x'  kill-pane                                                  # C-b x
bind -n 'M-z'  resize-pane -Z                                           # C-b z
bind -n 'M-o'  select-pane -t :.+                                       # C-b o
bind -n 'M-;'  last-pane                                                # C-b ;
bind -n 'M-q'  display-panes                                            # C-b q
bind -n 'M-m'  select-pane -m                                           # C-b m
bind -n 'M-M'  select-pane -M                                           # C-b M
bind -n 'M-{'  swap-pane -U                                             # C-b {
bind -n 'M-}'  swap-pane -D                                             # C-b }

# Pane navigation
bind -n 'M-h'  select-pane -L                                           # C-b Left
bind -n 'M-j'  select-pane -D                                           # C-b Down
bind -n 'M-k'  select-pane -U                                           # C-b Up
bind -n 'M-l'  select-pane -R                                           # C-b Right

# Pane resize
bind -r -n 'M-Up'    resize-pane -U 5
bind -r -n 'M-Down'  resize-pane -D 5
bind -r -n 'M-Left'  resize-pane -L 5
bind -r -n 'M-Right' resize-pane -R 5

# Layout
bind -r -n 'M-Space' next-layout                                        # C-b Space
bind -n 'M-E'       select-layout -E                                    # C-b E

# Windows
bind -n 'M-c'  new-window                                               # C-b c
bind -n 'M-n'  next-window                                              # C-b n
bind -n 'M-p'  previous-window                                          # C-b p
bind -n 'M-&'  confirm-before -p "kill-window #W? (y/n)" kill-window    # C-b &
bind -n 'M-,'  command-prompt -I "#W" "rename-window '%%'"              # C-b ,
bind -n 'M-w'  choose-tree -Zw                                          # C-b w
bind -n 'M-f'  command-prompt { find-window -Z "%%" }                   # C-b f
bind -n 'M-.'  command-prompt "move-window -t '%%'"                     # C-b .

# Window selection by number
bind -n 'M-0'  select-window -t :=0                                     # C-b 0
bind -n 'M-1'  select-window -t 1                                       # C-b 1
bind -n 'M-2'  select-window -t 2
bind -n 'M-3'  select-window -t 3
bind -n 'M-4'  select-window -t 4
bind -n 'M-5'  select-window -t 5
bind -n 'M-6'  select-window -t 6
bind -n 'M-7'  select-window -t 7
bind -n 'M-8'  select-window -t 8
bind -n 'M-9'  select-window -t 9

# Sessions
bind -n 'M-s'  choose-tree -Zs                                          # C-b s
bind -n 'M-$'  command-prompt -I "#S" "rename-session '%%'"             # C-b $
bind -n 'M-d'  detach-client                                            # C-b d
bind -n 'M-D'  choose-client                                            # C-b D
bind -n 'M-r'  refresh-client                                           # C-b r
bind -n 'M-L'  switch-client -l                                         # C-b L

# Session switching
bind -n 'M-('  switch-client -p                                         # C-b (
bind -n 'M-)'  switch-client -n                                         # C-b )

# Copy / scrollback
bind -n 'M-Enter'   copy-mode                                           # C-b [
bind -n 'M-]'       paste-buffer -p                                     # C-b ]
bind -n 'M-='       choose-buffer -Z                                    # C-b =
bind -n 'M-#'       list-buffers                                        # C-b #
bind -n 'M--'       delete-buffer                                       # C-b -
bind -n 'M-PageUp'  copy-mode -u                                        # C-b PPage

# Misc
bind -n 'M-:'       command-prompt                                      # C-b :
bind -n 'M-?'       list-keys -N                                        # C-b ?
bind -n 'M-~'       show-messages                                       # C-b ~
bind -n 'M-i'       display-message                                     # C-b i
bind -n 'M-t'       clock-mode                                          # C-b t
bind -n 'M-/'       command-prompt -k -p key { list-keys -1N "%%" }     # C-b /
bind -n 'M-C'       customize-mode -Z                                   # C-b C
bind -n 'M-Delete'  refresh-client -c                                   # C-b DC
bind -n "M-'"       command-prompt -T window-target -p index { select-window -t ":%%" }  # C-b '
